name: Build and publish VitePress sites to gh-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Build: existing SOP site (root of gh-pages) ──────────────────
      - name: Build SOP docs
        env:
          VITEPRESS_BASE: /ecommerce-ops-vitepress/
        run: pnpm docs:build

      # ── Build: interview site (nested under /interview/) ─────────────
      - name: Build interview site
        env:
          VITEPRESS_BASE: /ecommerce-ops-vitepress/interview/
        run: pnpm interview:build

      # ── Merge: copy interview dist into SOP dist/interview/ ──────────
      - name: Merge interview into docs dist
        run: |
          mkdir -p docs/.vitepress/dist/interview
          cp -r interview/.vitepress/dist/. docs/.vitepress/dist/interview/

      # ── Publish: push combined dist to gh-pages ──────────────────────
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vitepress/dist
          publish_branch: gh-pages
